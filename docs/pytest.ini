[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose 
    --strict-markers
    --tb=short
    --cov=services
    --cov=database
    --cov=api
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=60

markers =
    unit: Unit tests
    integration: Integration tests
    api: API tests
    slow: Slow running tests
    security: Security related tests
