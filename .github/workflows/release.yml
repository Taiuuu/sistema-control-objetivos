name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Set VERSION from tag
      shell: bash
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install PyInstaller
    
    - name: Update version in code
      shell: python
      run: |
        import os

        version = os.environ["VERSION"]

        with open("version.txt", "w") as f:
            f.write(version)

        with open("api/app.py", "r") as f:
            content = f.read()

        content = content.replace("1.0.0", version)

        with open("api/app.py", "w") as f:
            f.write(content)
    
    - name: Build executable
      run: |
        python -m PyInstaller "VESP Control.spec"
    
    - name: Build installer
      run: |
        iscc instalador.iss
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.exe
          Output/*.exe
        draft: false
        prerelease: false
        body: |
          VESP Control ${{ github.ref_name }}
          
          Descargar el instalador y ejecutar.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Notify release
      run: echo "Release ${{ github.ref_name }} completed!"